<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineClube - Contato</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <h1>CineClube</h1>
        <nav>
            <ul>
                <li><a href="http://127.0.0.1:5500/index.html">Home</a></li>
                <li><a href="http://127.0.0.1:5500/lancamentos.html">Lançamentos</a></li>
                <li><a href="#" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="area-contato">
            <h2>Fale Conosco</h2>
            <p>Envie sua sugestão de crítica ou anuncie no nosso portal.</p>

            <div class="contato-flex">
                <form class="formulario">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo">

                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Seu melhor e-mail">

                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Sua mensagem..."></textarea>

                    <button type="button">Enviar</button>
                </form>

                <div class="imagem-contato">
                    <img src="imagens/denise-jans-RFnkx4NecGg-h.jpg" alt="Nossa Sala de Cinema">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CineClube. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
